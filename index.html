<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.6, minimum-scale=0.6, maximum-scale=0.6, user-scalable=no">
<title>Penghitung Belanja</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    touch-action: manipulation;
    background: #fff;
    height: 100%;
}

#areaBelanja {
    background: #FFDFFD7A;
    padding: 15px;
    width: 100%;
}

h2, h3 {
    margin: 0;
    font-weight: bold;
}

h2 {
    font-size: 26px;
}

h3 {
    font-size: 22px;
    margin-top: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th, td {
    border: 5px solid #777;
    padding: 0;  /* Padding dihilangkan */
    font-size: 16px;
    text-align: center;
    font-weight: bold;
    height: 60px;  /* Tinggi tetap untuk semua sel */
    vertical-align: middle;  /* Posisi tengah vertikal */
}

/* Container untuk konten dalam sel */
td .cell-content {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 4px;
}

/* Khusus untuk sel dengan input */
td:has(input) {
    padding: 4px;
}

td input {
    width: 100%;
    height: 45px;  /* Tinggi input disesuaikan */
    padding: 4px 8px;
    font-size: 14px;
    text-align: center;
    font-weight: bold;
    border: 1px solid #999;
    border-radius: 4px;
    margin: 0;
    vertical-align: middle;
}

/* Style untuk teks subtotal */
.subtotal {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    width: 100%;
    font-size: 16px;
}

/* Style tombol hapus dengan tanda X */
td .hapus-btn {
    background: none;
    color: #ff0000;
    font-size: 28px;  /* Sedikit lebih besar */
    font-weight: bold;
    padding: 0;
    border: none;
    cursor: pointer;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
    line-height: 1;  /* Menjaga agar tanda X tidak terpotong */
}

td .hapus-btn:hover {
    transform: scale(1.2);
}

/* Header styling */
th {
    background-color: rgba(0,0,0,0.05);
    vertical-align: middle;
    text-align: center;
    height: 50px;
}

/* Kolom header dengan icon */
th:last-child {
    font-size: 20px;  /* Ukuran icon lebih besar */
    line-height: 1;
}

.actions {
    padding: 15px;
}

#filename {
    width: 300px;
    padding: 10px;
    font-size: 18px;
}

.actions button {
    margin-top: 10px;
    padding: 8px 15px;
    font-size: 16px;
}

/* Menyesuaikan lebar kolom */
th:first-child, td:first-child {
    width: 30%;
}

th:nth-child(2), td:nth-child(2),
th:nth-child(3), td:nth-child(3) {
    width: 20%;
}

th:nth-child(4), td:nth-child(4) {
    width: 20%;
}

th:last-child, td:last-child {
    width: 10%;
}
</style>
</head>
<body>

<div id="areaBelanja">
    <h2>🛒 Penghitung</h2>
    <h3>Total Harga : Rp: <span id="total">0</span></h3>
    
    <table id="tabelBelanja">
        <thead>
            <tr>
                <th>Nama Barang</th>
                <th>Jumlah</th>
                <th>Harga Satuan</th>
                <th>Total</th>
                <th>🗑️</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <input type="text" placeholder="Nama">
                </td>
                <td>
                    <input type="text" inputmode="numeric" class="jumlah" oninput="formatAngka(this); hitungTotal()" placeholder="0">
                </td>
                <td>
                    <input type="text" inputmode="numeric" class="harga" oninput="formatAngka(this); hitungTotal()" placeholder="0">
                </td>
                <td>
                    <div class="subtotal">0</div>
                </td>
                <td>
                    <button class="hapus-btn" onclick="hapusBaris(this)" title="Hapus">❎</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<div class="actions">
    <label>📝 Nama file gambar:</label>
    <input type="text" id="filename" value="Catatan">
    <br><br>
    <button onclick="tambahBaris()">+ Tambah Barang</button>
    <button onclick="simpanSebagaiGambar()">📷 Simpan Gambar</button>
</div>

<script>
function formatAngka(input) {
    let angka = input.value.replace(/\D/g, "");
    if (angka === "") angka = "0";
    input.value = parseInt(angka).toLocaleString("id-ID");
}

function parseAngka(str) {
    return parseInt(str.replace(/\./g, "")) || 0;
}

function hitungTotal() {
    const rows = document.querySelectorAll("#tabelBelanja tbody tr");
    let total = 0;
    
    rows.forEach(row => {
        const jumlah = parseAngka(row.querySelector(".jumlah").value);
        const harga = parseAngka(row.querySelector(".harga").value);
        const subtotal = jumlah * harga;
        row.querySelector(".subtotal").textContent = subtotal.toLocaleString("id-ID");
        total += subtotal;
    });
    
    document.getElementById("total").textContent = total.toLocaleString("id-ID");
}

function tambahBaris() {
    const tbody = document.querySelector("#tabelBelanja tbody");
    const baris = document.createElement("tr");
    baris.innerHTML = `
        <td><input type="text" placeholder="Nama"></td>
        <td><input type="text" inputmode="numeric" class="jumlah" oninput="formatAngka(this); hitungTotal()" placeholder="0"></td>
        <td><input type="text" inputmode="numeric" class="harga" oninput="formatAngka(this); hitungTotal()" placeholder="0"></td>
        <td><div class="subtotal">0</div></td>
        <td><button class="hapus-btn" onclick="hapusBaris(this)" title="Hapus">❎</button></td>
    `;
    tbody.appendChild(baris);
}

function hapusBaris(btn) {
    btn.closest('tr').remove();
    hitungTotal();
}

function simpanSebagaiGambar() {
    const nama = document.getElementById("filename").value || "Catatan";
    const area = document.getElementById("areaBelanja");
    
    html2canvas(area).then(canvas => {
        const a = document.createElement("a");
        a.href = canvas.toDataURL("image/png");
        a.download = nama + ".png";
        a.click();
    });
}

// Panggil hitungTotal untuk inisialisasi
hitungTotal();

// Tambahkan event listener untuk memastikan input selalu di tengah
document.addEventListener('input', function(e) {
    if (e.target.classList.contains('jumlah') || e.target.classList.contains('harga')) {
        // Format angka sudah ditangani di oninput
    }
});
</script>

</body>
</html>
